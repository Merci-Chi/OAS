<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sol Soul Companion</title>

<style>

body{
margin:0;
background:transparent;
overflow:hidden;
font-family:sans-serif;
}

/* SETTINGS PANEL */

.sol-settings{
position:fixed;
top:15px;
right:15px;
display:flex;
gap:8px;
padding:8px 10px;
background:rgba(0,0,0,.6);
border-radius:10px;
backdrop-filter:blur(6px);
z-index:1000;
}

.color{
width:18px;
height:18px;
border-radius:50%;
border:none;
cursor:pointer;
}

.color.gold{background:#fbbf24;}
.color.magenta{background:#ff3da8;}
.color.blue{background:#3da5ff;}
.color.lime{background:#8cff3d;}
.color.purple{background:#a855f7;}

/* SOL CONTAINER */

.sol{
position:absolute;
left:50%;
top:50%;
transform:translate(-50%,-50%);
width:140px;
height:140px;
}

/* GLOW */

.glow{
position:absolute;
width:130px;
height:130px;
left:50%;
top:50%;
transform:translate(-50%,-50%);
border-radius:50%;
filter:blur(24px);
background:radial-gradient(circle,rgba(251,191,36,.35),rgba(251,191,36,0) 70%);
}

/* FLAMES */

.outerFlame{
position:absolute;
width:98px;
height:112px;
left:50%;
top:50%;
transform:translate(-50%,-50%);
border-radius:50%;
background:radial-gradient(ellipse at center bottom,#d9770600 0%,#d9770640 50%,#d9770600 100%);
}

.midFlame{
position:absolute;
width:70px;
height:88px;
left:50%;
top:50%;
transform:translate(-50%,-50%);
border-radius:50%;
background:radial-gradient(ellipse at center bottom,#f59e0b 0%,#f59e0b80 40%,transparent 70%);
}

/* CORE */

.core{
position:absolute;
width:44px;
height:56px;
left:50%;
top:50%;
transform:translate(-50%,-50%);
border-radius:50%;
background:radial-gradient(circle,#fff 0%,#fbbf24 40%,#f59e0b 80%);
box-shadow:0 0 40px rgba(251,191,36,.6);
display:flex;
justify-content:center;
align-items:center;
transition:transform .15s ease-out;
}

/* EYES */

.eyes{
display:flex;
gap:6px;
transform:translateY(6px);
transition:transform .1s linear;
}

.eye{
width:7px;
height:9px;
background:rgba(0,0,0,.65);
border-radius:50%;
}

</style>
</head>
<body>

<!-- SETTINGS -->

<div class="sol-settings">

<button class="color gold" onclick="setSolColor('gold')"></button>
<button class="color magenta" onclick="setSolColor('magenta')"></button>
<button class="color blue" onclick="setSolColor('blue')"></button>
<button class="color lime" onclick="setSolColor('lime')"></button>
<button class="color purple" onclick="setSolColor('purple')"></button>

</div>

<!-- SOL -->

<div class="sol" id="sol">

<div class="glow" id="glow"></div>
<div class="outerFlame" id="outerFlame"></div>
<div class="midFlame" id="midFlame"></div>

<div class="core" id="core">
<div class="eyes" id="eyes">
<div class="eye"></div>
<div class="eye"></div>
</div>
</div>

</div>

<script>

/* ELEMENTS */

const sol=document.getElementById("sol")
const core=document.getElementById("core")
const eyes=document.getElementById("eyes")
const glow=document.getElementById("glow")
const outerFlame=document.getElementById("outerFlame")
const midFlame=document.getElementById("midFlame")

let dragging=false

/* flame lag state */

let flameX=0
let flameY=0

let velocityX=0
let velocityY=0

let prevMouseX=0
let prevMouseY=0

const maxRadius=30
const safeRadius=maxRadius*0.9


/* FLAME PHYSICS LOOP */

function animateFlame(){

flameX += (-velocityX - flameX)*0.15
flameY += (-velocityY - flameY)*0.15

let dist=Math.sqrt(flameX*flameX+flameY*flameY)

if(dist>safeRadius){
flameX*=safeRadius/dist
flameY*=safeRadius/dist
}

outerFlame.style.transform=
`translate(calc(-50% + ${flameX}px),calc(-50% + ${flameY}px))`

midFlame.style.transform=
`translate(calc(-50% + ${flameX*0.7}px),calc(-50% + ${flameY*0.7}px))`

glow.style.transform=
`translate(calc(-50% + ${flameX*0.45}px),calc(-50% + ${flameY*0.45}px))`

requestAnimationFrame(animateFlame)

}

animateFlame()


/* START DRAG — ONLY CORE */

core.addEventListener("mousedown",(e)=>{

dragging=true

prevMouseX=e.clientX
prevMouseY=e.clientY

/* bounce */

core.animate([
{transform:'translate(-50%,-50%) scale(1,1)'},
{transform:'translate(-50%,-50%) scale(1.1,.8)'},
{transform:'translate(-50%,-50%) scale(.95,1.05)'},
{transform:'translate(-50%,-50%) scale(1,.9)'}
],
{duration:350,easing:'ease-out'})

core.style.transform="translate(-50%,-50%) scale(1.05,.85)"

})


/* DRAG MOVEMENT */

document.addEventListener("mousemove",(e)=>{

const rect=sol.getBoundingClientRect()
const cx=rect.left+rect.width/2
const cy=rect.top+rect.height/2

/* dragging */

if(dragging){

velocityX=(e.clientX-prevMouseX)*1.2
velocityY=(e.clientY-prevMouseY)*1.2

prevMouseX=e.clientX
prevMouseY=e.clientY

/* cursor becomes core center */

sol.style.left=e.clientX+"px"
sol.style.top=e.clientY+"px"
sol.style.transform="translate(-50%,-50%)"

}

/* idle eye tracking */

else{

let dx=(e.clientX-cx)*0.04
let dy=(e.clientY-cy)*0.04

eyes.style.transform=`translate(${dx}px,${6+dy}px)`

}

})


/* RELEASE */

document.addEventListener("mouseup",()=>{

if(!dragging) return

dragging=false

core.style.transform="translate(-50%,-50%) scale(1)"

})


/* BLINKING */

function blink(){

eyes.style.transform+=" scaleY(0)"

setTimeout(()=>{
eyes.style.transform=eyes.style.transform.replace(" scaleY(0)","")
},120)

scheduleBlink()

}

function scheduleBlink(){
setTimeout(blink,9000+Math.random()*14000)
}

scheduleBlink()


/* COLOR SETTINGS */

function setSolColor(type){

const colors={

gold:{core:"#fbbf24",mid:"#f59e0b",outer:"#d97706",glow:"rgba(251,191,36,.35)"},

magenta:{core:"#ff6ad5",mid:"#ff3da8",outer:"#c0268c",glow:"rgba(255,61,168,.35)"},

blue:{core:"#7dd3fc",mid:"#3da5ff",outer:"#2563eb",glow:"rgba(61,165,255,.35)"},

lime:{core:"#d9ff7d",mid:"#8cff3d",outer:"#4d9e1a",glow:"rgba(140,255,61,.35)"},

purple:{core:"#d8b4fe",mid:"#a855f7",outer:"#7e22ce",glow:"rgba(168,85,247,.35)"}

}

let c=colors[type]

core.style.background=`radial-gradient(circle,#fff 0%,${c.core} 40%,${c.mid} 80%)`
core.style.boxShadow=`0 0 40px ${c.glow}`

midFlame.style.background=
`radial-gradient(ellipse at center bottom,${c.mid} 0%,${c.mid}80 40%,transparent 70%)`

outerFlame.style.background=
`radial-gradient(ellipse at center bottom,${c.outer}00 0%,${c.outer}40 50%,${c.outer}00 100%)`

glow.style.background=
`radial-gradient(circle,${c.glow},rgba(0,0,0,0) 70%)`

}

</script>

</body>
</html>
