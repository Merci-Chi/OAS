<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sol Soul Companion</title>
<style>
body {
  margin:0;
  background: #000;
  width:100%;
  height:100%;
  overflow:hidden;
  font-family:sans-serif;
}

/* Core & eyes */
.core {
  position:absolute;
  width:44px;
  height:56px;
  top:50%;
  left:50%;
  transform: translate(-50%, -50%);
  background: radial-gradient(circle at center, #fff 0%, #fbbf24 40%, #f59e0b 80%);
  box-shadow:0 0 36px rgba(251,191,36,0.6),0 0 16px rgba(251,191,36,0.4) inset;
  border-radius:50%;
  display:flex;
  justify-content:center;
  align-items:center;
  transition: transform 0.1s ease-out;
  z-index:3;
}

.eyes {
  display:flex;
  justify-content:center;
  align-items:center;
  gap:6px;
  position: relative;
  top: 6px;
  transition: transform 0.1s ease-out;
}

.eye {
  width:7px;
  height:9px;
  background: rgba(0,0,0,0.6);
  border-radius:50%;
  transform-origin:center center;
}

/* Aura */
.glow {
  position:absolute;
  width:130px;
  height:130px;
  border-radius:50%;
  top:50%;
  left:50%;
  transform: translate(-50%, -50%);
  filter: blur(24px);
  background: radial-gradient(circle, rgba(251,191,36,0.3) 0%, rgba(251,191,36,0) 70%);
  animation: glowPulse 10s infinite ease-in-out, glowRotate 60s linear infinite;
  z-index:0;
}

/* Flames */
.outerFlame {
  position:absolute;
  width:98px;
  height:112px;
  top:50%;
  left:50%;
  border-radius:50%;
  background: radial-gradient(ellipse at center bottom, #d9770600 0%, #d9770640 50%, #d9770600 100%);
  animation: outerFlameAnim 4s infinite ease-in-out, outerFlicker 3s infinite alternate;
  z-index:1;
}

.midFlame {
  position:absolute;
  width:70px;
  height:88px;
  top:50%;
  left:50%;
  border-radius:50%;
  background: radial-gradient(ellipse at center bottom, #f59e0b 0%, #f59e0b80 40%, transparent 70%);
  animation: midFlameAnim 3.5s infinite ease-in-out, midFlicker 2.5s infinite alternate;
  z-index:2;
}

/* Level */
.level {
  position:absolute;
  bottom:10px;
  left:50%;
  transform: translateX(-50%);
  padding:2px 4px;
  font-size:10px;
  background: rgba(0,0,0,0.8);
  border:1px solid rgba(251,191,36,0.5);
  border-radius:12px;
  color:#fbbf24;
  font-weight:bold;
  z-index:4;
}

/* Animations */
@keyframes glowPulse {0%,100%{ transform: translate(-50%, -50%) scale(1); opacity:0.3;} 50%{ transform: translate(-50%, -50%) scale(1.3); opacity:0.6;}}
@keyframes glowRotate {0%{ transform: translate(-50%, -50%) rotate(0deg);} 100%{ transform: translate(-50%, -50%) rotate(360deg);}}
@keyframes outerFlameAnim {0%,100%{ transform: translate(-50%, -50%) scaleX(1) scaleY(1);} 50%{ transform: translate(-50%, -50%) scaleX(1.08) scaleY(1.12);}}
@keyframes midFlameAnim {0%,100%{ transform: translate(-50%, -50%) scaleX(1) scaleY(1);} 50%{ transform: translate(-50%, -50%) scaleX(1.06) scaleY(1.1);}}
@keyframes outerFlicker {0%{transform: translate(-50%, -50%) rotate(-1deg) scale(1,1.02);}25%{transform: translate(-50%, -50%) rotate(0.5deg) scale(1,0.98);}50%{transform: translate(-50%, -50%) rotate(1deg) scale(1,1.01);}75%{transform: translate(-50%, -50%) rotate(-0.5deg) scale(1,0.99);}100%{transform: translate(-50%, -50%) rotate(-1deg) scale(1,1.02);}}
@keyframes midFlicker {0%{transform: translate(-50%, -50%) rotate(1deg) scale(1,1.01);}25%{transform: translate(-50%, -50%) rotate(-0.5deg) scale(1,0.99);}50%{transform: translate(-50%, -50%) rotate(0.5deg) scale(1,1.02);}75%{transform: translate(-50%, -50%) rotate(-1deg) scale(1,0.98);}100%{transform: translate(-50%, -50%) rotate(1deg) scale(1,1.01);}}
</style>
</head>
<body>

<div class="glow"></div>
<div class="outerFlame"></div>
<div class="midFlame"></div>

<div class="core">
  <div class="eyes">
    <div class="eye"></div>
    <div class="eye"></div>
  </div>
</div>

<div class="level">LV.1</div>

<script>
const core = document.querySelector('.core');
const eyes = document.querySelector('.eyes');
const outerFlame = document.querySelector('.outerFlame');
const midFlame = document.querySelector('.midFlame');
const glow = document.querySelector('.glow');

const centerX = window.innerWidth/2;
const centerY = window.innerHeight/2;
const maxDistance = 40; // max core movement radius inside flame

let isDragging=false, offsetX=0, offsetY=0;
let coreX = centerX, coreY = centerY;
let flameX = centerX, flameY = centerY;

// Drag start
core.addEventListener('mousedown', (e)=>{
  isDragging=true;
  offsetX = e.clientX - core.offsetLeft;
  offsetY = e.clientY - core.offsetTop;

  // Soft bobble
  core.animate([
    { transform: `translate(-50%, -50%) translateY(0)` },
    { transform: `translate(-50%, -50%) translateY(4px)` },
    { transform: `translate(-50%, -50%) translateY(-2px)` },
    { transform: `translate(-50%, -50%) translateY(0)` }
  ], { duration:200, easing:'ease-out' });
});

document.addEventListener('mousemove',(e)=>{
  if(!isDragging) return;

  let targetX = e.clientX - offsetX + core.offsetWidth/2;
  let targetY = e.clientY - offsetY + core.offsetHeight/2;

  // constrain inside maxDistance from center
  const dx = targetX - centerX;
  const dy = targetY - centerY;
  const dist = Math.sqrt(dx*dx + dy*dy);
  if(dist>maxDistance){
    const ratio = maxDistance/dist;
    targetX = centerX + dx*ratio;
    targetY = centerY + dy*ratio;
  }

  coreX = targetX;
  coreY = targetY;
  core.style.left = coreX + 'px';
  core.style.top = coreY + 'px';
});

document.addEventListener('mouseup',()=>{
  isDragging=false;
});

// Flame + glow follow with soft delay
function animateFlames(){
  flameX += (coreX - flameX)*0.08;
  flameY += (coreY - flameY)*0.08;

  outerFlame.style.left = flameX + 'px';
  outerFlame.style.top = flameY + 'px';
  midFlame.style.left = flameX + 'px';
  midFlame.style.top = flameY + 'px';
  glow.style.left = flameX + 'px';
  glow.style.top = flameY + 'px';

  requestAnimationFrame(animateFlames);
}
animateFlames();

// Eyes follow cursor subtly
document.addEventListener('mousemove',(e)=>{
  const rect = core.getBoundingClientRect();
  const cx = rect.left + rect.width/2;
  const cy = rect.top + rect.height/2;
  const dx = (e.clientX - cx)*0.03;
  const dy = (e.clientY - cy)*0.03;
  eyes.style.transform = `translate(${dx}px, ${dy}px)`;
});

// Random blinking
function blink(){
  eyes.style.transform += ' scaleY(0)';
  setTimeout(()=>{ eyes.style.transform = 'translate(0,6px)'; }, 150);
  scheduleBlink();
}
function scheduleBlink(){
  setTimeout(blink, 10000+Math.random()*15000);
}
scheduleBlink();
</script>

</body>
</html>
