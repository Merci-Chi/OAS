<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sol Soul Companion</title>

<style>

body{
margin:0;
background:#000;
overflow:hidden;
font-family:sans-serif;
}

/* main container */

.sol{
position:absolute;
left:50%;
top:50%;
transform:translate(-50%,-50%);
width:140px;
height:140px;
pointer-events:auto;
}

/* aura */

.glow{
position:absolute;
width:130px;
height:130px;
left:50%;
top:50%;
transform:translate(-50%,-50%);
border-radius:50%;
filter:blur(24px);
background:radial-gradient(circle,rgba(251,191,36,.35),rgba(251,191,36,0) 70%);
}

/* flames */

.outerFlame{
position:absolute;
width:98px;
height:112px;
left:50%;
top:50%;
transform:translate(-50%,-50%);
border-radius:50%;
background:radial-gradient(ellipse at center bottom,#d9770600 0%,#d9770640 50%,#d9770600 100%);
}

.midFlame{
position:absolute;
width:70px;
height:88px;
left:50%;
top:50%;
transform:translate(-50%,-50%);
border-radius:50%;
background:radial-gradient(ellipse at center bottom,#f59e0b 0%,#f59e0b80 40%,transparent 70%);
}

/* core */

.core{
position:absolute;
width:44px;
height:56px;
left:50%;
top:50%;
transform:translate(-50%,-50%);
border-radius:50%;
background:radial-gradient(circle,#fff 0%,#fbbf24 40%,#f59e0b 80%);
box-shadow:0 0 40px rgba(251,191,36,.6);
display:flex;
justify-content:center;
align-items:center;
transition:transform .15s ease-out;
}

/* eyes */

.eyes{
display:flex;
gap:6px;
transform:translateY(6px);
transition:transform .1s linear;
}

.eye{
width:7px;
height:9px;
background:rgba(0,0,0,.65);
border-radius:50%;
}

/* idle floating */

@keyframes float{
0%{transform:translate(-50%,-50%) translateY(0)}
50%{transform:translate(-50%,-50%) translateY(-8px)}
100%{transform:translate(-50%,-50%) translateY(0)}
}

</style>
</head>
<body>

<div class="sol" id="sol">

<div class="glow" id="glow"></div>
<div class="outerFlame" id="outerFlame"></div>
<div class="midFlame" id="midFlame"></div>

<div class="core" id="core">
<div class="eyes" id="eyes">
<div class="eye"></div>
<div class="eye"></div>
</div>
</div>

</div>

<script>

const sol=document.getElementById("sol")
const core=document.getElementById("core")
const eyes=document.getElementById("eyes")

const glow=document.getElementById("glow")
const outerFlame=document.getElementById("outerFlame")
const midFlame=document.getElementById("midFlame")

let dragging=false

/* flame lag system */

let flameX=0
let flameY=0
let targetX=0
let targetY=0

function animateFlame(){

flameX+=(targetX-flameX)*0.18
flameY+=(targetY-flameY)*0.18

outerFlame.style.transform=`translate(calc(-50% + ${flameX}px),calc(-50% + ${flameY}px))`
midFlame.style.transform=`translate(calc(-50% + ${flameX*0.7}px),calc(-50% + ${flameY*0.7}px))`
glow.style.transform=`translate(calc(-50% + ${flameX*0.4}px),calc(-50% + ${flameY*0.4}px))`

requestAnimationFrame(animateFlame)

}

animateFlame()

/* grab */

sol.addEventListener("mousedown",(e)=>{

dragging=true

/* bounce reaction */

core.animate([
{transform:'translate(-50%,-50%) scale(1,1)'},
{transform:'translate(-50%,-50%) scale(1.1,.8)'},
{transform:'translate(-50%,-50%) scale(.95,1.05)'},
{transform:'translate(-50%,-50%) scale(1,.9)'}
],
{duration:350,easing:'ease-out'})

/* stay compressed */

core.style.transform="translate(-50%,-50%) scale(1.05,.85)"

})

/* movement */

document.addEventListener("mousemove",(e)=>{

const rect=sol.getBoundingClientRect()

const cx=rect.left+rect.width/2
const cy=rect.top+rect.height/2

if(dragging){

/* cursor becomes core center */

sol.style.left=e.clientX+"px"
sol.style.top=e.clientY+"px"

sol.style.transform="translate(-50%,-50%)"

/* flame lag */

targetX=(cx-e.clientX)*0.4
targetY=(cy-e.clientY)*0.4

}

else{

/* idle eye tracking */

let dx=(e.clientX-cx)*0.04
let dy=(e.clientY-cy)*0.04

eyes.style.transform=`translate(${dx}px,${6+dy}px)`

}

})

/* release */

document.addEventListener("mouseup",()=>{

dragging=false

core.style.transform="translate(-50%,-50%) scale(1)"

targetX=0
targetY=0

})

/* blinking */

function blink(){

eyes.style.transform+=" scaleY(0)"

setTimeout(()=>{
eyes.style.transform=eyes.style.transform.replace(" scaleY(0)","")
},120)

scheduleBlink()

}

function scheduleBlink(){

setTimeout(blink,9000+Math.random()*14000)

}

scheduleBlink()

</script>

</body>
</html>
