<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sol Soul Companion</title>
<style>
body {
  margin:0;
  background: #000;
  width:100%;
  height:100%;
  overflow:hidden;
  font-family:sans-serif;
}

/* Wrapper for dragging */
.character-wrapper {
  position: absolute;
  left:50%;
  top:50%;
  transform: translate(-50%, -50%);
  cursor: grab;
  will-change: transform;
}

/* Inner group for alignment */
.character-inner {
  position: relative;
  width:140px;
  height:140px;
  display:flex;
  justify-content:center;
  align-items:center;
}

/* Soul aura */
.glow {
  position:absolute;
  inset:0;
  border-radius:50%;
  filter: blur(24px);
  background: radial-gradient(circle, rgba(251,191,36,0.3) 0%, rgba(251,191,36,0) 70%);
  animation: glowPulse 10s infinite ease-in-out, glowRotate 60s linear infinite;
  transition: transform 0.3s ease-out;
}

/* Flame layers */
.layer {
  position:absolute;
  top:50%;
  left:50%;
  transform: translate(-50%, -50%);
  border-radius:50%;
  display:flex;
  justify-content:center;
  align-items:center;
  transition: transform 0.2s ease-out;
}

.outerFlame {
  width:90px;
  height:102px;
  background: radial-gradient(ellipse at center bottom, #d9770600 0%, #d9770640 50%, #d9770600 100%);
  animation: outerFlameAnim 4s infinite ease-in-out, outerFlicker 3s infinite alternate;
}

.midFlame {
  width:64px;
  height:82px;
  background: radial-gradient(ellipse at center bottom, #f59e0b 0%, #f59e0b80 40%, transparent 70%);
  animation: midFlameAnim 3.5s infinite ease-in-out, midFlicker 2.5s infinite alternate;
}

/* Core (soul) */
.core {
  width:40px;  
  height:52px; 
  background: radial-gradient(circle at center, #ffffff 0%, #fbbf24 40%, #f59e0b 80%);
  box-shadow: 0 0 36px rgba(251,191,36,0.6), 0 0 16px rgba(251,191,36,0.4) inset;
  animation: corePulse 3s infinite ease-in-out, coreFloat 6s infinite ease-in-out;
  display:flex;
  justify-content:center;
  align-items:center;
  transform: translate(-50%, -50%);
}

/* Eyes container */
.eyes {
  display:flex;
  justify-content:center;
  align-items:center;
  gap:6px; /* eyes slightly closer */
  position: relative;
  top: 6px; /* slightly lower */
  transition: transform 0.1s ease-out;
}

/* Eyes */
.eye {
  width:7px;  
  height:9px;
  background: rgba(0,0,0,0.6);
  border-radius:50%;
  transform-origin: center center;
}

/* Level indicator */
.level {
  position:absolute;
  bottom:-8px;
  left:50%;
  transform: translateX(-50%);
  padding:2px 4px;
  font-size:10px;
  background: rgba(0,0,0,0.8);
  border:1px solid rgba(251,191,36,0.5);
  border-radius:12px;
  color:#fbbf24;
  font-weight:bold;
}

/* Animations */
@keyframes glowPulse {
  0%,100%{ transform: scale(1); opacity:0.3;}
  50%{ transform: scale(1.3); opacity:0.6;}
}

@keyframes glowRotate {
  0%{ transform: rotate(0deg);}
  100%{ transform: rotate(360deg);}
}

@keyframes outerFlameAnim { 
  0%,100%{ transform: translate(-50%, -50%) scaleX(1) scaleY(1);} 
  50%{ transform: translate(-50%, -50%) scaleX(1.08) scaleY(1.12);}
}

@keyframes midFlameAnim { 
  0%,100%{ transform: translate(-50%, -50%) scaleX(1) scaleY(1);} 
  50%{ transform: translate(-50%, -50%) scaleX(1.06) scaleY(1.1);}
}

@keyframes outerFlicker {
  0% { transform: translate(-50%, -50%) rotate(-1deg) scale(1,1.02);}
  25% { transform: translate(-50%, -50%) rotate(0.5deg) scale(1,0.98);}
  50% { transform: translate(-50%, -50%) rotate(1deg) scale(1,1.01);}
  75% { transform: translate(-50%, -50%) rotate(-0.5deg) scale(1,0.99);}
  100% { transform: translate(-50%, -50%) rotate(-1deg) scale(1,1.02);}
}

@keyframes midFlicker {
  0% { transform: translate(-50%, -50%) rotate(1deg) scale(1,1.01);}
  25% { transform: translate(-50%, -50%) rotate(-0.5deg) scale(1,0.99);}
  50% { transform: translate(-50%, -50%) rotate(0.5deg) scale(1,1.02);}
  75% { transform: translate(-50%, -50%) rotate(-1deg) scale(1,0.98);}
  100% { transform: translate(-50%, -50%) rotate(1deg) scale(1,1.01);}
}

@keyframes corePulse { 
  0%,100%{ transform: translate(-50%, -48%) scale(1);} 
  50%{ transform: translate(-50%, -48%) scale(1.1);}
}

@keyframes coreFloat {
  0%{ transform: translate(-50%, -48%) translateY(0);}
  50%{ transform: translate(-50%, -48%) translateY(-6px);}
  100%{ transform: translate(-50%, -48%) translateY(0);}
}
</style>
</head>
<body>

<div class="character-wrapper">
  <div class="character-inner">
    <div class="glow"></div>
    <div class="layer outerFlame"></div>
    <div class="layer midFlame"></div>
    <div class="layer core">
      <div class="eyes">
        <div class="eye"></div>
        <div class="eye"></div>
      </div>
    </div>
    <div class="level">LV.1</div>
  </div>
</div>

<script>
const wrapper = document.querySelector('.character-wrapper');
const inner = document.querySelector('.character-inner');
const glow = document.querySelector('.glow');
const outerFlame = document.querySelector('.outerFlame');
const midFlame = document.querySelector('.midFlame');
const eyes = document.querySelector('.eyes');

// Floating motion
wrapper.animate(
  [
    { transform:'translate(-50%, -50%) translateY(0)' },
    { transform:'translate(-50%, -50%) translateY(-8px)' },
    { transform:'translate(-50%, -50%) translateY(0)'}
  ],
  { duration:8000, iterations:Infinity, easing:'ease-in-out'}
);

// Draggable with lag
let isDragging=false, offsetX=0, offsetY=0;
let targetX = 0, targetY = 0;

wrapper.addEventListener('mousedown',(e)=>{
  isDragging=true;
  offsetX = e.clientX - wrapper.offsetLeft;
  offsetY = e.clientY - wrapper.offsetTop;
  wrapper.style.cursor='grabbing';
});
document.addEventListener('mousemove',(e)=>{
  if(!isDragging) return;
  targetX = e.clientX - offsetX;
  targetY = e.clientY - offsetY;
  wrapper.style.left = `${targetX}px`;
  wrapper.style.top = `${targetY}px`;

  // Slight delay for aura/flames
  outerFlame.style.transform = `translate(-50%, -50%) translate(${(targetX - window.innerWidth/2)*0.05}px, ${(targetY - window.innerHeight/2)*0.05}px)`;
  midFlame.style.transform = `translate(-50%, -50%) translate(${(targetX - window.innerWidth/2)*0.03}px, ${(targetY - window.innerHeight/2)*0.03}px)`;
  glow.style.transform = `translate(${(targetX - window.innerWidth/2)*0.02}px, ${(targetY - window.innerHeight/2)*0.02}px)`;
});
document.addEventListener('mouseup',()=>{
  isDragging=false;
  wrapper.style.cursor='grab';
});

// Randomized blinking
function blink() {
  eyes.style.transform = 'scaleY(0.6) scaleX(1.2)';
  setTimeout(()=>{ eyes.style.transform = 'scaleY(1) scaleX(1)'; }, 150);
  scheduleBlink();
}
function scheduleBlink() {
  const time = 5000 + Math.random()*10000; 
  setTimeout(blink, time);
}
scheduleBlink();

// Eyes follow cursor
document.addEventListener('mousemove', (e)=>{
  const rect = wrapper.getBoundingClientRect();
  const cx = rect.left + rect.width/2;
  const cy = rect.top + rect.height/2;
  const dx = (e.clientX - cx) * 0.05; // subtle movement
  const dy = (e.clientY - cy) * 0.05;
  eyes.style.transform = `translate(${dx}px, ${dy}px)`;
});
</script>

</body>
</html>
