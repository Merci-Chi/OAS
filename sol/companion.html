<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sol Companion Central Orb</title>
<style>
:root {
  --main-color: #fbbf24;
}

body {
  margin:0;
  background:transparent;
  width:100%;
  height:100%;
  overflow:hidden;
  font-family:sans-serif;
}

.character-wrapper {
  position: absolute;
  left:50%;
  top:50%;
  transform: translate(-50%, -50%);
  width:120px;
  height:120px;
  cursor: grab;
}

/* Central container for all layers */
.layer-container {
  position:relative;
  width:100%;
  height:100%;
  display:flex;
  justify-content:center;
  align-items:center;
}

/* Glow */
.glow {
  position:absolute;
  width:120px;
  height:120px;
  border-radius:50%;
  filter: blur(16px);
  background: rgba(251,191,36,0.6);
  animation: glowPulse 4s infinite;
  top:50%;
  left:50%;
  transform: translate(-50%, -50%);
}

/* Flame layers */
.layer {
  position:absolute;
  display:flex;
  justify-content:center;
  align-items:center;
  left:50%;
}

.outerFlame {
  width:84px;
  height:96px;
  background: radial-gradient(ellipse at center bottom, var(--main-color)00 0%, var(--main-color)40 50%, var(--main-color)00 100%);
  animation: outerFlameAnim 1.6s infinite;
  top:50%;
  transform: translate(-50%, -50%);
}

.midFlame {
  width:60px;
  height:78px;
  background: radial-gradient(ellipse at center bottom, var(--main-color) 0%, var(--main-color)80 40%, transparent 70%);
  animation: midFlameAnim 1.2s infinite;
  top:50%;
  transform: translate(-50%, -50%);
}

/* Core orb */
.core {
  width:42px;
  height:42px;
  background: radial-gradient(circle at center, #ffffff 0%, var(--main-color) 40%, var(--main-color) 80%);
  box-shadow:0 0 30px rgba(251,191,36,0.6);
  animation: corePulse 2s infinite;
  position:absolute;
  border-radius:50%;
  top:50%;
  left:50%;
  transform: translate(-50%, -50%);
}

/* Level */
.level {
  position:absolute;
  bottom:-8px;
  left:50%;
  transform: translateX(-50%);
  padding:2px 4px;
  font-size:10px;
  background: rgba(0,0,0,0.8);
  border:1px solid rgba(251,191,36,0.5);
  border-radius:12px;
  color: var(--main-color);
  font-weight:bold;
}

/* Particles */
.particle {
  position:absolute;
  bottom:50%;
  left:50%;
  width:4px;
  height:4px;
  border-radius:50%;
  background: var(--main-color);
  opacity:0;
  pointer-events:none;
  animation: particleRise 2s forwards;
}

/* Animations */
@keyframes glowPulse {0%,100%{ transform: scale(1); opacity:0.4;} 50%{ transform: scale(1.2); opacity:0.6;}}
@keyframes outerFlameAnim {0%,100%{ transform: translate(-50%, -50%) scale(1);} 50%{ transform: translate(-50%, -50%) scaleX(1.1) scaleY(1.15);}}
@keyframes midFlameAnim {0%,100%{ transform: translate(-50%, -50%) scale(1);} 50%{ transform: translate(-50%, -50%) scaleX(1.08) scaleY(1.12);}}
@keyframes corePulse {0%,100%{ transform: translate(-50%, -50%) scale(1);} 50%{ transform: translate(-50%, -50%) scale(1.08);}}
@keyframes particleRise {
  0% { opacity:0; transform: translate(-50%,0) scale(0.5);}
  20% { opacity:1; }
  100% { opacity:0; transform: translate(calc(-50% + var(--dx,0px)),-60px) scale(0.3);}
}
</style>
</head>
<body>

<div class="character-wrapper">
  <div class="layer-container">
    <div class="glow"></div>
    <div class="layer outerFlame"></div>
    <div class="layer midFlame"></div>
    <div class="layer core"></div>
  </div>
  <div class="level">LV.1</div>
</div>

<script>
// Floating motion
const wrapper = document.querySelector('.character-wrapper');
wrapper.animate(
  [
    { transform:'translate(-50%, -50%) translateY(0)' },
    { transform:'translate(-50%, -50%) translateY(-8px)' },
    { transform:'translate(-50%, -50%) translateY(0)'}
  ],
  { duration:6000, iterations:Infinity, easing:'ease-in-out'}
);

// Draggable
let isDragging=false, offsetX=0, offsetY=0;
wrapper.addEventListener('mousedown',(e)=>{
  isDragging=true;
  offsetX = e.clientX - wrapper.offsetLeft;
  offsetY = e.clientY - wrapper.offsetTop;
  wrapper.style.cursor='grabbing';
});
document.addEventListener('mousemove',(e)=>{
  if(!isDragging) return;
  wrapper.style.left = `${e.clientX - offsetX}px`;
  wrapper.style.top = `${e.clientY - offsetY}px`;
});
document.addEventListener('mouseup',()=>{
  isDragging=false;
  wrapper.style.cursor='grab';
});

// Particle spawn
function spawnParticle() {
  const p = document.createElement('div');
  p.className = 'particle';
  const dx = (Math.random()*40 - 20);
  p.style.setProperty('--dx', `${dx}px`);
  wrapper.appendChild(p);
  setTimeout(()=>p.remove(),2000);
}
setInterval(spawnParticle, 300);

// Color selector
function setColor(color) {
  document.documentElement.style.setProperty('--main-color', color);
}
</script>

<!-- Color Buttons -->
<div style="position:fixed; top:10px; left:10px; z-index:999;">
  <button onclick="setColor('#fbbf24')">Yellow</button>
  <button onclick="setColor('#3b82f6')">Blue</button>
  <button onclick="setColor('#ef4444')">Red</button>
  <button onclick="setColor('#10b981')">Green</button>
</div>

</body>
</html>
