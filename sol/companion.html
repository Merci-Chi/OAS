<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sol Companion</title>
<style>
body {
  margin:0;
  background:transparent;
  width:100%;
  height:100%;
  overflow:hidden;
  font-family:sans-serif;
}

/* Wrapper for dragging, slightly shifted up (-45% instead of -50%) */
.character-wrapper {
  position: absolute;
  left:50%;
  top:50%;
  transform: translate(-50%, -45%);
  cursor: grab;
}

/* Inner group for all layers to align perfectly */
.character-inner {
  position: relative;
  width:120px;
  height:120px;
  display:flex;
  justify-content:center;
  align-items:center;
}

/* Glow */
.glow {
  position:absolute;
  inset:0;
  border-radius:50%;
  filter: blur(16px);
  background: rgba(251,191,36,0.6);
  animation: glowPulse 4s infinite;
}

/* Layers */
.layer {
  position:absolute;
  border-radius:50%;
  display:flex;
  justify-content:center;
  align-items:center;
}

.outerFlame {
  width:84px;
  height:96px;
  background: radial-gradient(ellipse at center bottom, #d9770600 0%, #d9770640 50%, #d9770600 100%);
  animation: outerFlameAnim 1.6s infinite;
}

.midFlame {
  width:60px;
  height:78px;
  background: radial-gradient(ellipse at center bottom, #f59e0b 0%, #f59e0b80 40%, transparent 70%);
  animation: midFlameAnim 1.2s infinite;
}

.core {
  width:42px;
  height:54px;
  background: radial-gradient(circle at center, #ffffff 0%, #fbbf24 40%, #f59e0b 80%);
  box-shadow:0 0 30px rgba(251,191,36,0.6);
  animation: corePulse 2s infinite;
  position:absolute;
  bottom:10%; /* keeps the head aligned with flames */
  display:flex;
  justify-content:center;
  align-items:center;
}

/* Eyes */
.eye {
  width:6px;
  height:8px;
  background: rgba(0,0,0,0.6);
  border-radius:50%;
  position:absolute;
  bottom:30%;
}
.eye.left { left:25%; }
.eye.right { right:25%; }
.eye.blink { animation: blink 6s infinite; }

/* Level */
.level {
  position:absolute;
  bottom:-8px;
  left:50%;
  transform: translateX(-50%);
  padding:2px 4px;
  font-size:10px;
  background: rgba(0,0,0,0.8);
  border:1px solid rgba(251,191,36,0.5);
  border-radius:12px;
  color:#fbbf24;
  font-weight:bold;
}

/* Animations */
@keyframes glowPulse {0%,100%{ transform: scale(1); opacity:0.4;} 50%{ transform: scale(1.2); opacity:0.6;}}
@keyframes outerFlameAnim {0%,100%{ transform: scaleX(1) scaleY(1);} 50%{ transform: scaleX(1.1) scaleY(1.15);}}
@keyframes midFlameAnim {0%,100%{ transform: scaleX(1) scaleY(1);} 50%{ transform: scaleX(1.08) scaleY(1.12);}}
@keyframes corePulse {0%,100%{ transform: scale(1);} 50%{ transform: scale(1.08);}}
@keyframes blink {0%,20%,40%,60%,100%{ transform: scaleY(1);} 10%,30%,50%{ transform: scaleY(0.3); }}
</style>
</head>
<body>

<div class="character-wrapper">
  <div class="character-inner">
    <div class="glow"></div>
    <div class="layer outerFlame"></div>
    <div class="layer midFlame"></div>
    <div class="layer core">
      <div class="eye left blink"></div>
      <div class="eye right blink"></div>
    </div>
    <div class="level">LV.1</div>
  </div>
</div>

<script>
// Floating motion
const wrapper = document.querySelector('.character-wrapper');
wrapper.animate(
  [
    { transform:'translate(-50%, -45%) translateY(0)' },
    { transform:'translate(-50%, -45%) translateY(-8px)' },
    { transform:'translate(-50%, -45%) translateY(0)'}
  ],
  { duration:6000, iterations:Infinity, easing:'ease-in-out'}
);

// Draggable
let isDragging=false, offsetX=0, offsetY=0;
wrapper.addEventListener('mousedown',(e)=>{
  isDragging=true;
  offsetX = e.clientX - wrapper.offsetLeft;
  offsetY = e.clientY - wrapper.offsetTop;
  wrapper.style.cursor='grabbing';
});
document.addEventListener('mousemove',(e)=>{
  if(!isDragging) return;
  wrapper.style.left = `${e.clientX - offsetX}px`;
  wrapper.style.top = `${e.clientY - offsetY}px`;
});
document.addEventListener('mouseup',()=>{
  isDragging=false;
  wrapper.style.cursor='grab';
});
</script>

</body>
</html>
