<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sol Companion</title>
<style>
body {
  margin:0;
  background:transparent;
  overflow:hidden;
  height:100%;
  width:100%;
  font-family:sans-serif;
}

.character-wrapper {
  position: absolute;
  left:50%;
  top:50%;
  width: 120px;
  height: 120px;
  display:flex;
  justify-content:center;
  align-items:center;
  transform-origin:center;
  cursor: grab;
}

.glow {
  position: absolute;
  inset:0;
  border-radius:50%;
  filter: blur(16px);
  background: rgba(251,191,36,0.6);
  animation: glowPulse 4s infinite;
}

.particle {
  position: absolute;
  width:3px;
  height:3px;
  border-radius:50%;
  background:#fbbf24;
  bottom:30%;
  left:50%;
  opacity:0;
  animation: particleRise 3s forwards;
}

.layer {
  position:absolute;
  border-radius:50%;
  inset:0;
  display:flex;
  justify-content:center;
  align-items:center;
}

.outerFlame {
  width:84px;
  height:96px;
  background: radial-gradient(ellipse at center bottom, #d9770600 0%, #d9770640 50%, #d9770600 100%);
  animation: outerFlameAnim 1.6s infinite;
}

.midFlame {
  width:60px;
  height:78px;
  background: radial-gradient(ellipse at center bottom, #f59e0b 0%, #f59e0b80 40%, transparent 70%);
  animation: midFlameAnim 1.2s infinite;
  animation-delay:0.1s;
}

.core {
  width:42px;
  height:54px;
  background: radial-gradient(circle at center, #ffffff 0%, #fbbf24 40%, #f59e0b 80%);
  box-shadow: 0 0 30px rgba(251,191,36,0.6);
  animation: corePulse 2s infinite;
  position:relative;
}

.eye {
  width:6px;
  height:8px;
  background: rgba(0,0,0,0.6);
  border-radius:50%;
  position:absolute;
  bottom:30%;
}

.eye.left { left:25%; }
.eye.right { right:25%; }
.eye.blink { animation: blink 6s infinite; }

.level {
  position:absolute;
  bottom:-8px;
  left:50%;
  transform: translateX(-50%);
  padding:2px 4px;
  font-size:10px;
  background: rgba(0,0,0,0.8);
  border:1px solid rgba(251,191,36,0.5);
  border-radius:12px;
  color:#fbbf24;
  font-weight:bold;
}

@keyframes glowPulse {0%,100%{ transform: scale(1); opacity:0.4;} 50%{ transform: scale(1.2); opacity:0.6;}}
@keyframes particleRise {0% { opacity:0; transform: translateY(0) translateX(var(--x,0px)); } 50% { opacity:1; } 100% { opacity:0; transform: translateY(-50px) translateX(calc(var(--x,0px) + var(--dx,0px))); }}
@keyframes outerFlameAnim {0%,100% { transform: scaleX(1) scaleY(1);} 50% { transform: scaleX(1.1) scaleY(1.15);}}
@keyframes midFlameAnim {0%,100% { transform: scaleX(1) scaleY(1);} 50% { transform: scaleX(1.08) scaleY(1.12);}}
@keyframes corePulse {0%,100% { transform: scale(1);} 50% { transform: scale(1.08);}}
@keyframes blink {0%,20%,40%,60%,100% { transform: scaleY(1); } 10%,30%,50% { transform: scaleY(0.3); }}
</style>
</head>
<body>

<div class="character-wrapper">
  <div class="glow"></div>
  <div class="layer outerFlame"></div>
  <div class="layer midFlame"></div>
  <div class="layer core">
    <div class="eye left blink"></div>
    <div class="eye right blink"></div>
  </div>
  <div class="level">LV.1</div>
</div>

<script>
const wrapper = document.querySelector('.character-wrapper');

// Floating motion
wrapper.animate(
  [{ transform:'translateY(0)'},{ transform:'translateY(-8px)'},{ transform:'translateY(0)'}],
  { duration:6000, iterations:Infinity, easing:'ease-in-out'}
);

// Particle generation
const health = 100;
function spawnParticle() {
  if(health <=50) return;
  const p = document.createElement('div');
  p.className='particle';
  const x = Math.random()*40-20;
  p.style.setProperty('--x', `${x}px`);
  p.style.setProperty('--dx', `${Math.random()*20-10}px`);
  wrapper.appendChild(p);
  setTimeout(()=>p.remove(),3000);
}
setInterval(spawnParticle, 1600);

// Draggable
let isDragging=false, offsetX=0, offsetY=0;
wrapper.addEventListener('mousedown',(e)=>{
  isDragging=true;
  offsetX = e.clientX - wrapper.offsetLeft;
  offsetY = e.clientY - wrapper.offsetTop;
  wrapper.style.cursor='grabbing';
});
document.addEventListener('mousemove',(e)=>{
  if(!isDragging) return;
  wrapper.style.left = `${e.clientX - offsetX}px`;
  wrapper.style.top = `${e.clientY - offsetY}px`;
});
document.addEventListener('mouseup',()=>{ isDragging=false; wrapper.style.cursor='grab'; });
</script>

</body>
</html>
