<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sol Soul Companion</title>

<style>
body{
margin:0;
background:#000;
overflow:hidden;
font-family:sans-serif;
}

/* container */
.sol{
position:absolute;
left:50%;
top:50%;
transform:translate(-50%,-50%);
width:140px;
height:140px;
}

/* aura */
.glow{
position:absolute;
width:130px;
height:130px;
left:50%;
top:50%;
transform:translate(-50%,-50%);
border-radius:50%;
filter:blur(24px);
background:radial-gradient(circle,rgba(251,191,36,.35),rgba(251,191,36,0) 70%);
animation:glowPulse 12s infinite ease-in-out;
}

/* flames */

.outerFlame{
position:absolute;
width:98px;
height:112px;
left:50%;
top:50%;
transform:translate(-50%,-50%);
border-radius:50%;
background:radial-gradient(ellipse at center bottom,#d9770600 0%,#d9770640 50%,#d9770600 100%);
animation:outerFlame 5s infinite ease-in-out;
}

.midFlame{
position:absolute;
width:70px;
height:88px;
left:50%;
top:50%;
transform:translate(-50%,-50%);
border-radius:50%;
background:radial-gradient(ellipse at center bottom,#f59e0b 0%,#f59e0b80 40%,transparent 70%);
animation:midFlame 4s infinite ease-in-out;
}

/* core */

.core{
position:absolute;
width:44px;
height:56px;
left:50%;
top:50%;
transform:translate(-50%,-50%);
border-radius:50%;
background:radial-gradient(circle,#fff 0%,#fbbf24 40%,#f59e0b 80%);
box-shadow:0 0 40px rgba(251,191,36,.6);
display:flex;
justify-content:center;
align-items:center;
transition:transform .15s ease-out;
}

/* eyes */

.eyes{
display:flex;
gap:6px;
transform:translateY(6px);
transition:transform .08s linear;
}

.eye{
width:7px;
height:9px;
background:rgba(0,0,0,.65);
border-radius:50%;
}

/* animations */

@keyframes glowPulse{
0%,100%{transform:translate(-50%,-50%) scale(1)}
50%{transform:translate(-50%,-50%) scale(1.2)}
}

@keyframes outerFlame{
0%,100%{transform:translate(-50%,-50%) scale(1,1)}
50%{transform:translate(-50%,-50%) scale(1.08,1.12)}
}

@keyframes midFlame{
0%,100%{transform:translate(-50%,-50%) scale(1,1)}
50%{transform:translate(-50%,-50%) scale(1.05,1.1)}
}

</style>
</head>
<body>

<div class="sol" id="sol">

<div class="glow"></div>
<div class="outerFlame"></div>
<div class="midFlame"></div>

<div class="core" id="core">
<div class="eyes" id="eyes">
<div class="eye"></div>
<div class="eye"></div>
</div>
</div>

</div>

<script>

const sol = document.getElementById("sol")
const core = document.getElementById("core")
const eyes = document.getElementById("eyes")

let dragging=false
let offsetX=0
let offsetY=0

const maxRadius=30
const safeRadius=maxRadius*0.8

/* drag entire companion */

sol.addEventListener("mousedown",(e)=>{

dragging=true

offsetX = e.clientX - sol.offsetLeft
offsetY = e.clientY - sol.offsetTop

/* bobble */

core.animate([
{transform:'translate(-50%,-50%) translateY(0)'},
{transform:'translate(-50%,-50%) translateY(10px)'},
{transform:'translate(-50%,-50%) translateY(-7px)'},
{transform:'translate(-50%,-50%) translateY(3px)'},
{transform:'translate(-50%,-50%) translateY(0)'}
],
{duration:700,easing:'ease-out'})

})

document.addEventListener("mousemove",(e)=>{

const rect = sol.getBoundingClientRect()

const cx = rect.left + rect.width/2
const cy = rect.top + rect.height/2

/* dragging movement */

if(dragging){

sol.style.left = e.clientX - offsetX + "px"
sol.style.top  = e.clientY - offsetY + "px"

/* core moves toward cursor */

let dx = e.clientX - cx
let dy = e.clientY - cy

dx*=0.15
dy*=0.15

let dist=Math.sqrt(dx*dx+dy*dy)

if(dist>safeRadius){
dx*=safeRadius/dist
dy*=safeRadius/dist
}

core.style.transform=`translate(-50%,-50%) translate(${dx}px,${dy}px)`

eyes.style.transform=`translate(${dx*0.3}px,${6+dy*0.3}px)`

}

/* idle behavior */

else{

/* core returns to center */

core.style.transform="translate(-50%,-50%)"

/* only eyes follow */

let dx=(e.clientX-cx)*0.04
let dy=(e.clientY-cy)*0.04

eyes.style.transform=`translate(${dx}px,${6+dy}px)`

}

})

document.addEventListener("mouseup",()=>dragging=false)


/* blinking */

function blink(){

eyes.style.transform+=" scaleY(0)"

setTimeout(()=>{
eyes.style.transform=eyes.style.transform.replace(" scaleY(0)","")
},120)

scheduleBlink()

}

function scheduleBlink(){

setTimeout(blink,8000+Math.random()*12000)

}

scheduleBlink()

</script>

</body>
</html>
