<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<style>

body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#111;
}

.character{
  position:relative;
  width:300px;
  height:300px;
}

.layer{
  position:absolute;
  inset:0;
  display:flex;
  justify-content:center;
  align-items:center;
}

.layer img{
  width:100%;
  height:100%;
  object-fit:contain;
}

/* stack order */

.layer1{ z-index:1; }
.layer3{ z-index:2; }
.layer2{ z-index:3; }
.layer4{ z-index:4; }

/* animations */

.layer1{
  animation: expandSlow 6s ease-in-out infinite alternate;
}

.layer2{
  animation: expandFast 4s ease-in-out infinite alternate;
}

.layer3{
  animation: hover 3s ease-in-out infinite;
}

.layer4{
  animation: shrinkCenter 5s ease-in-out infinite alternate;
  transform-origin:center;
}

@keyframes expandSlow{
  from{ transform:scale(1); }
  to{ transform:scale(1.06); }
}

@keyframes expandFast{
  from{ transform:scale(1); }
  to{ transform:scale(1.12); }
}

@keyframes hover{
  0%{ transform:translateY(-8px); }
  50%{ transform:translateY(8px); }
  100%{ transform:translateY(-8px); }
}

@keyframes shrinkCenter{
  from{ transform:scaleY(1); }
  to{ transform:scaleY(0.85); }
}

</style>
</head>

<body>

<div class="character">

  <div class="layer layer1">
    <img src="images/layer1.png">
  </div>

  <div class="layer layer3">
    <img src="images/layer3.png">
  </div>

  <div class="layer layer2">
    <img src="images/layer2.png">
  </div>

  <div class="layer layer4">
    <img src="images/layer4.png">
  </div>

</div>

</body>
</html>
