<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Character Animation</title>

<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#111;
}

.character{
  position:relative;
  width:300px;
  height:300px;
}

.layer{
  position:absolute;
  inset:0;
}

.layer img{
  width:100%;
  height:100%;
  object-fit:contain;
}

.layer1{
  animation: expandSlow 6s ease-in-out infinite alternate;
}

.layer2{
  animation: expandFast 4s ease-in-out infinite alternate;
}

.layer3{
  animation: hover 3s ease-in-out infinite;
}

.layer4{
  transform-origin:center;
  animation: shrinkCenter 5s ease-in-out infinite alternate;
}

@keyframes expandSlow{
  from{ transform:scale(1); }
  to{ transform:scale(1.08); }
}

@keyframes expandFast{
  from{ transform:scale(1); }
  to{ transform:scale(1.15); }
}

@keyframes hover{
  0%{ transform:translateY(-10px); }
  50%{ transform:translateY(10px); }
  100%{ transform:translateY(-10px); }
}

@keyframes shrinkCenter{
  from{ transform:scaleY(1); }
  to{ transform:scaleY(0.85); }
}
</style>
</head>

<body>

<div class="character">

  <div class="layer layer1">
    <img src="images/layer1.png">
  </div>

  <div class="layer layer2">
    <img src="images/layer2.png">
  </div>

  <div class="layer layer3">
    <img src="images/layer3.png">
  </div>

  <div class="layer layer4">
    <img src="images/layer4.png">
  </div>

</div>

</body>
</html>
