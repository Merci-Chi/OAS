<!-- /index.html -->
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>OASENSE OFFICIAL WEBSITE</title>

<style>
body{
    background:linear-gradient(45deg, red, yellow, lime, cyan, magenta);
    font-family:"Comic Sans MS",Papyrus,cursive;
    text-align:center;
    animation:hue 6s linear infinite;
    overflow-x:hidden;
}
@keyframes hue{
    0%{filter:hue-rotate(0deg);}
    100%{filter:hue-rotate(360deg);}
}
h1{
    font-size:60px;
    color:white;
    text-shadow:5px 5px black;
    animation:blink 1s infinite;
}
@keyframes blink{
    50%{opacity:0;}
}
.logo{
    font-size:90px;
    animation:spin 3s linear infinite;
}
@keyframes spin{
    0%{transform:rotate(0deg)}
    100%{transform:rotate(360deg)}
}
.section{
    background:white;
    border:10px ridge purple;
    margin:20px;
    padding:20px;
}
button{
    background:hotpink;
    border:6px dashed yellow;
    font-size:20px;
    padding:15px;
    cursor:pointer;
}
.popupAd{
    position:fixed;
    background:yellow;
    border:5px solid red;
    padding:20px;
    font-size:20px;
    z-index:999;
    animation:shake .5s infinite;
}
@keyframes shake{
    0%{transform:translate(0)}
    25%{transform:translate(5px)}
    50%{transform:translate(-5px)}
    75%{transform:translate(5px)}
    100%{transform:translate(0)}
}
.star{
    position:absolute;
    font-size:20px;
    pointer-events:none;
}
.fakeMalware{
    background:red;
    color:white;
    border:10px solid yellow;
    font-size:25px;
    padding:20px;
    margin:30px;
    cursor:pointer;
    animation:blink 0.5s infinite;
}
</style>
</head>
